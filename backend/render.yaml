# Render deployment — SINGLE service that serves frontend + backend on the same domain.
# This eliminates ALL cross-origin headaches (CORS, ITP, cookies, etc.).
services:
  - type: web
    name: syvren-backend
    runtime: python
    plan: free
    rootDir: .
    buildCommand: |
      cd frontend && yarn install --frozen-lockfile && CI=false yarn build && cd .. \
      && cd backend && pip install --upgrade pip && pip install -r requirements.txt
    startCommand: cd backend && uvicorn server:app --host 0.0.0.0 --port $PORT --workers 1
    healthCheckPath: /api/
    envVars:
      - key: MONGO_URL
        sync: false
      - key: DB_NAME
        value: syvren
      - key: EMERGENT_LLM_KEY
        sync: false
      - key: CORS_ORIGINS
        value: "*"
      - key: REACT_APP_BACKEND_URL
        value: ""
      - key: PYTHON_VERSION
        value: "3.11.10"
      - key: NODE_VERSION
        value: "20.11.0"
